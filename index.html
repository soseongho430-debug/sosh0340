<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dance Choreography Finder</title>
    <style>
        :root { 
            --bg-color: #121212; 
            --card-bg: #1e1e1e; 
            --text-color: #ffffff; 
            --text-muted: #aaaaaa; 
            --accent-color: #ff4757; 
            --border-color: #333333; 
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { color: var(--accent-color); font-size: 2.5rem; margin-bottom: 10px; }
        .search-section { background-color: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 30px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex: 1; padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); background-color: #2d2d2d; color: white; font-size: 1rem; }
        .btn { padding: 0 30px; border-radius: 8px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-search { background-color: var(--accent-color); color: white; }
        .btn-refresh { background-color: #2f3542; color: white; display: none; } /* 검색 전에는 숨김 */
        .filters { display: flex; flex-wrap: wrap; gap: 20px; padding-top: 15px; border-top: 1px solid var(--border-color); }
        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group label { font-size: 0.9rem; color: var(--text-muted); font-weight: bold; }
        .filter-group select { padding: 10px 15px; border-radius: 6px; background-color: #2d2d2d; color: white; border: 1px solid var(--border-color); cursor: pointer; min-width: 150px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .video-card { background-color: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid var(--border-color); transition: transform 0.2s; }
        .video-card:hover { transform: translateY(-5px); }
        .video-card a { text-decoration: none; color: inherit; }
        .thumbnail-container { position: relative; width: 100%; padding-top: 56.25%; }
        .thumbnail-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .video-info { padding: 15px; }
        .video-title { font-size: 1rem; font-weight: bold; margin: 0 0 10px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
        .channel-name { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; }
        .video-meta { font-size: 0.8rem; color: var(--text-muted); display: flex; justify-content: space-between; }
        .status-message { text-align: center; font-size: 1.2rem; color: var(--text-muted); margin-top: 50px; width: 100%; } 
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Dance & Choreography Finder</h1>
        <p>원하는 장르를 검색하고 최신/인기 안무 영상을 필터링해 보세요.</p>
    </header>
    <main>
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="genreInput" placeholder="춤 장르를 입력하세요 (예: K-pop, HipHop, Popping)">
                <button class="btn btn-search" onclick="initialSearch()">검색</button>
                <button class="btn btn-refresh" id="refreshBtn" onclick="refreshVideos()">🔄 다른 영상 보기 (새로고침)</button>
            </div>
            <div class="filters">
                <div class="filter-group">
                    <label for="videoType">동영상 형태</label>
                    <select id="videoType">
                        <option value="all">전체 비디오</option>
                        <option value="shorts">Shorts (쇼츠)</option>
                        <option value="normal">일반 동영상</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="timeRange">기간 및 정렬 조건</label>
                    <select id="timeRange">
                        <option value="today">당일 업로드 (최신순)</option>
                        <option value="week">최근 1주일 (조회수 높은순)</option>
                        <option value="month">최근 한 달 (조회수 높은순)</option>
                        <option value="year">올해 업로드 (조회수 높은순)</option>
                        <option value="allTime">기간 전체 (조회수 높은순)</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="regionType">국가 우선순위</label>
                    <select id="regionType">
                        <option value="all">제한 없음</option>
                        <option value="ko">한국 영상 우선</option>
                        <option value="en">외국(영어권) 영상 우선</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="video-grid" id="videoGrid">
            <div class="status-message">장르를 입력하고 검색을 시작해 주세요!</div>
        </div>
    </main>
</div>

<script>
    // ⚠️ 중요: 발급받으신 본인의 구글 YouTube Data API v3 키를 여기에 넣으셔야 실제로 작동합니다.
    const API_KEY = 'AIzaSyDjb6EuJcqPFbhwyIShQHDl1cwF32zd69U'; 

    let nextPageToken = ''; // 다음 페이지 영상을 불러오기 위한 토큰 변수 (새로고침 기능용)
    let currentQuery = '';

    // 첫 검색 함수
    function initialSearch() {
        nextPageToken = ''; // 새로운 검색어이므로 페이지 토큰 초기화
        fetchDanceVideos();
    }

    // 다른 영상 보기(새로고침) 함수
    function refreshVideos() {
        fetchDanceVideos(nextPageToken);
    }

    async function fetchDanceVideos(pageToken = '') {
        const genreInput = document.getElementById('genreInput').value.trim();
        const videoType = document.getElementById('videoType').value;
        const timeRange = document.getElementById('timeRange').value;
        const regionType = document.getElementById('regionType').value;
        const videoGrid = document.getElementById('videoGrid');
        const refreshBtn = document.getElementById('refreshBtn');

        if (!genreInput) { alert('장르를 입력해 주세요!'); return; }
        if (API_KEY === 'YOUR_YOUTUBE_API_KEY_HERE') {
            alert('유튜브 API_KEY를 소스 코드 내에 입력하셔야 실시간 조회가 가능합니다.');
            return;
        }

        videoGrid.innerHTML = '<div class="status-message">조건에 맞는 최적의 안무 영상을 탐색 중입니다...</div>';
        
        const searchQuery = `${genreInput} choreography`;
        let publishedAfter = '';
        const now = new Date();
        
        if (timeRange === 'today') { 
            now.setHours(0,0,0,0); 
            publishedAfter = now.toISOString(); 
        } else if (timeRange === 'week') { 
            now.setDate(now.getDate() - 7); 
            publishedAfter = now.toISOString(); 
        } else if (timeRange === 'month') { 
            now.setDate(now.getDate() - 30); 
            publishedAfter = now.toISOString(); 
        } else if (timeRange === 'year') { 
            publishedAfter = `${new Date().getFullYear()}-01-01T00:00:00Z`; 
        }

        const order = (timeRange === 'today') ? 'date' : 'relevance';
        let videoDurationParam = 'any';
        if (videoType === 'shorts') videoDurationParam = 'short';
        else if (videoType === 'normal') videoDurationParam = 'medium';

        // 기본 검색 API 주소 세팅
        let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(searchQuery)}&type=video&order=${order}&videoDuration=${videoDurationParam}&maxResults=50&key=${API_KEY}`;
        
        if (publishedAfter) url += `&publishedAfter=${publishedAfter}`;
        if (pageToken) url += `&pageToken=${pageToken}`; // 새로고침 시 다음 데이터 가져오기
        
        // 국가별 언어 셋업 파라미터 반영
        if (regionType !== 'all') {
            url += `&relevanceLanguage=${regionType}`;
        }

        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            let videos = data.items;
            nextPageToken = data.nextPageToken || ''; // 다음 새로고침 때 쓸 토큰 업데이트

            if (!videos || videos.length === 0) { 
                videoGrid.innerHTML = '<div class="status-message">검색 결과가 없습니다. 다른 조건으로 검색해 보세요.</div>'; 
                return; 
            }

            // 조회수 및 상세 정보를 가공하기 위해 비디오 ID 배열 생성
            const videoIds = videos.map(item => item.id.videoId).join(',');
            const statsUrl = `https://www.googleapis.com/youtube/v3/videos?part=statistics,contentDetails,snippet&id=${videoIds}&key=${API_KEY}`;
            const statsResponse = await fetch(statsUrl);
            const statsData = await statsResponse.json();
            
            const videoDetailsMap = {};
            statsData.items.forEach(item => {
                videoDetailsMap[item.id] = { 
                    viewCount: parseInt(item.statistics.viewCount || 0), 
                    duration: item.contentDetails.duration,
                    defaultAudioLanguage: item.snippet.defaultAudioLanguage || '' 
                };
            });

            // 쇼츠 선택 시 60초 이하의 영상만 남기도록 2차 검증 필터링
            if (videoType === 'shorts') {
                videos = videos.filter(video => {
                    const detail = videoDetailsMap[video.id.videoId];
                    if (!detail) return false;
                    
                    // YouTube API의 shortVideos 필터는 60초 이하를 의미
                    // 여기서 추가적인 조건은 60초 초과 영상 제외
                    const duration = detail.duration; // PT#M#S 형식
                    const matches = duration.match(/PT(?:(\d+)M)?(?:(\d+)S)?/);
                    if (!matches) return false;

                    const minutes = parseInt(matches[1] || '0');
                    const seconds = parseInt(matches[2] || '0');
                    return (minutes * 60 + seconds) <= 60;
                });
            }

            // 한국어/영어 우선 필터링
            if (regionType === 'ko' || regionType === 'en') {
                videos.sort((a, b) => {
                    const langA = videoDetailsMap[a.id.videoId]?.defaultAudioLanguage;
                    const langB = videoDetailsMap[b.id.videoId]?.defaultAudioLanguage;
                    
                    const scoreA = (langA && langA.startsWith(regionType)) ? -1 : 0;
                    const scoreB = (langB && langB.startsWith(regionType)) ? -1 : 0;
                    
                    return scoreA - scoreB; // 우선 언어가 -1로 먼저 오도록 정렬
                });
            }

            if (pageToken === '') { // 첫 검색이거나 새로운 검색어일 경우에만 기존 결과 지우기
                videoGrid.innerHTML = '';
            }
            
            if (videos.length === 0) {
                 videoGrid.innerHTML = '<div class="status-message">조건에 일치하는 영상이 없습니다.</div>';
                 refreshBtn.style.display = 'none'; // 결과 없으면 새로고침 버튼 숨김
                 return;
            }

            // 결과 화면 렌더링
            videos.forEach(video => {
                const videoId = video.id.videoId;
                const title = video.snippet.title;
                const channelTitle = video.snippet.channelTitle;
                const thumbnail = video.snippet.thumbnails.medium.url;
                const publishedAt = new Date(video.snippet.publishedAt).toLocaleDateString();
                const detail = videoDetailsMap[videoId];
                const viewCount = detail ? parseInt(detail.viewCount).toLocaleString() : '0';

                videoGrid.innerHTML += `
                    <div class="video-card">
                        <a href="https://www.youtube.com/watch?v=${videoId}" target="_blank">
                            <div class="thumbnail-container"><img src="${thumbnail}"></div>
                            <div class="video-info">
                                <div class="video-title">${title}</div>
                                <div class="channel-name">${channelTitle}</div>
                                <div class="video-meta"><span>👁️ ${viewCount}회</span><span>📅 ${publishedAt}</span></div>
                            </div>
                        </a>
                    </div>`;
            });
            refreshBtn.style.display = 'block'; // 검색 결과가 있으면 새로고침 버튼 표시

        } catch (error) {
            videoGrid.innerHTML = `<div class="status-message" style="color: var(--accent-color);">오류: ${error.message}</div>`;
            refreshBtn.style.display = 'none'; // 오류 발생 시 새로고침 버튼 숨김
        }
    }
</script>
</body>
</html>
