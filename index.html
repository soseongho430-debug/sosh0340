<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dance Choreography & Formation Studio</title>
    <style>
        :root { 
            --bg-color: #121212; 
            --card-bg: #1e1e1e; 
            --text-color: #ffffff; 
            --text-muted: #aaaaaa; 
            --accent-color: #ff4757; 
            --border-color: #333333; 
            --studio-bg: #1a1a1a;
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--accent-color); font-size: 2rem; margin-bottom: 10px; }
        .search-section { background-color: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 25px; }
        .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-box input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background-color: #2d2d2d; color: white; font-size: 1rem; min-width: 0; }
        
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
        .btn-search { background-color: var(--accent-color); color: white; }
        .btn-refresh { background-color: #2f3542; color: white; display: none; }
        .btn-action { background-color: #3742fa; color: white; margin-top: 5px; width: 100%; }
        .btn-danger { background-color: #ff4757; color: white; padding: 5px 10px; font-size: 0.8rem; }
        
        .filters { display: flex; flex-wrap: wrap; gap: 15px; padding-top: 15px; border-top: 1px solid var(--border-color); }
        .filter-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 120px; }
        .filter-group label { font-size: 0.85rem; color: var(--text-muted); font-weight: bold; }
        .filter-group select { padding: 10px; border-radius: 6px; background-color: #2d2d2d; color: white; border: 1px solid var(--border-color); cursor: pointer; font-size: 0.9rem; }
        
        /* 비디오 그리드 */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .video-card { background-color: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid var(--border-color); cursor: pointer; transition: transform 0.2s; }
        .thumbnail-container { position: relative; width: 100%; padding-top: 56.25%; }
        .thumbnail-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .video-info { padding: 12px; }
        .video-title { font-size: 0.95rem; font-weight: bold; margin: 0 0 8px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
        .channel-name { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; }
        .video-meta { font-size: 0.75rem; color: var(--text-muted); display: flex; justify-content: space-between; }
        .status-message { text-align: center; font-size: 1.1rem; color: var(--text-muted); margin-top: 40px; width: 100%; }

        /* 분석 스튜디오 모달 팝업 */
        .studio-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; padding: 10px; }
        .studio-window { background-color: var(--studio-bg); border-radius: 12px; border: 1px solid var(--border-color); width: 100%; max-width: 1300px; height: 95vh; display: flex; flex-direction: column; overflow: hidden; }
        .studio-header { padding: 12px 20px; background-color: #222; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .studio-title { font-size: 1.05rem; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 85%; }
        .close-btn { background: none; border: none; color: white; font-size: 2rem; cursor: pointer; line-height: 1; }
        
        .studio-body { display: flex; flex-direction: row; flex: 1; overflow: hidden; }
        
        /* 왼쪽: 플레이어 */
        .player-sidebar { flex: 1.2; background-color: #000; display: flex; flex-direction: column; justify-content: center; position: relative; border-right: 1px solid var(--border-color); }
        .video-wrapper { position: relative; padding-top: 56.25%; width: 100%; }
        .video-wrapper iframe, .video-wrapper div { position: absolute; top:0; left:0; width:100%; height:100%; }

        /* 오른쪽: 분석 도구 */
        .analysis-sidebar { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background-color: #1e1e1e; }
        .section-title { font-size: 1rem; color: var(--accent-color); font-weight: bold; margin-bottom: 8px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        
        /* AI 분석창 */
        .ai-analysis-box { background: #2f3542; border-left: 5px solid #2ed573; padding: 12px; border-radius: 6px; font-size: 0.9rem; line-height: 1.5; }
        .ai-tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; margin-right: 5px; background: #1e1e1e; color: #2ed573; }

        /* 📐 무대 격자 드래그 패널 */
        .canvas-section { display: flex; flex-direction: column; gap: 6px; }
        .canvas-container { position: relative; background: #181818; border: 2px solid #333; border-radius: 8px; width: 100%; max-width: 400px; margin: 0 auto; aspect-ratio: 4/3; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; cursor: default; touch-action: none; }
        .canvas-tools { display: flex; justify-content: space-between; gap: 5px; max-width: 400px; margin: 0 auto; width: 100%; }
        .canvas-tools button { flex: 1; padding: 8px; font-size: 0.8rem; background: #2f3542; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .canvas-tools button:hover { background: #ff4757; }
        
        .timeline-input-group { display: flex; gap: 6px; margin-top: 2px; }
        .timeline-input-group input { flex: 1; padding: 8px 12px; background: #121212; border: 1px solid #444; color: white; border-radius: 6px; font-size: 0.9rem; min-width: 0; }
        .timeline-list { display: flex; flex-direction: column; gap: 6px; max-height: 150px; overflow-y: auto; margin-top: 8px; }
        .timeline-item { background: #2a2a2a; padding: 8px 12px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--accent-color); cursor: pointer; }
        .item-info { display: flex; flex-direction: column; gap: 2px; }
        .item-time { font-weight: bold; color: #ff4757; font-size: 0.85rem; }
        .item-desc { font-size: 0.85rem; color: #fff; }

        /* 📋 동선표 최종 요약 리포트 영역 */
        .report-section { background-color: #252525; padding: 15px; border-radius: 8px; border: 1px solid #444; margin-top: 10px; }
        .report-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-top: 10px; }
        .report-card { background: #1a1a1a; padding: 8px; border-radius: 6px; text-align: center; border: 1px solid #333; transition: transform 0.2s; }
        .report-card:hover { transform: scale(1.03); border-color: #2ed573; }
        .report-card img { width: 100%; border-radius: 4px; background: #181818; aspect-ratio: 4/3; object-fit: contain; display: block; }
        .report-card-time { font-size: 0.8rem; color: var(--accent-color); font-weight: bold; margin-top: 5px; }
        .report-card-desc { font-size: 0.75rem; color: #ddd; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; }

        @media (max-width: 768px) {
            .studio-body { flex-direction: column; overflow-y: auto; }
            .player-sidebar { flex: none; width: 100%; }
            .analysis-sidebar { flex: none; width: 100%; overflow-y: visible; }
            .studio-window { height: 98vh; }
        }
    </style>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
<div class="container">
    <header>
        <h1>Dance & Formation Studio</h1>
        <p>무대 격자 위 마커들을 드래그하여 안무 동선표 리포트를 디자인하세요.</p>
    </header>
    <main>
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="genreInput" placeholder="춤 장르 혹은 곡명을 입력하세요 (예: K-pop, HipHop)">
                <button class="btn btn-search" onclick="initialSearch()">검색</button>
                <button class="btn btn-refresh" id="refreshBtn" onclick="refreshVideos()">🔄 다른 영상 보기</button>
            </div>
            <div class="filters">
                <div class="filter-group">
                    <label for="videoType">동영상 형태</label>
                    <select id="videoType">
                        <option value="all">전체 비디오</option>
                        <option value="shorts">Shorts (쇼츠)</option>
                        <option value="normal">일반 동영상</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="timeRange">기간 및 정렬 조건</label>
                    <select id="timeRange">
                        <option value="today">당일 업로드 (최신순)</option>
                        <option value="week">최근 1주일 (조회수 높은순)</option>
                        <option value="month" selected>최근 한 달 (조회수 높은순)</option>
                        <option value="year">올해 업로드 (조회수 높은순)</option>
                        <option value="allTime">기간 전체 (조회수 높은순)</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="regionType">국가 우선순위</label>
                    <select id="regionType">
                        <option value="all">제한 없음</option>
                        <option value="ko">한국 영상 우선</option>
                        <option value="en">외국(영어권) 영상 우선</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="video-grid" id="videoGrid">
            <div class="status-message">장르나 아티스트를 입력하고 검색을 시작해 주세요!</div>
        </div>
    </main>
</div>

<div class="studio-overlay" id="studioOverlay">
    <div class="studio-window">
        <div class="studio-header">
            <div class="studio-title" id="studioTitle">안무 분석 스튜디오</div>
            <button class="close-btn" onclick="closeStudio()">×</button>
        </div>
        <div class="studio-body">
            <div class="player-sidebar">
                <div class="video-wrapper">
                    <div id="ytPlayer"></div>
                </div>
            </div>
            <div class="analysis-sidebar">
                
                <div>
                    <div class="section-title">🤖 시스템 안무 속도 및 난이도 진단</div>
                    <div class="ai-analysis-box" id="aiAnalysisBox">영상을 분석하는 중입니다...</div>
                </div>

                <div class="canvas-section">
                    <div class="section-title">📐 격자 대형 드래그 배치 패드</div>
                    <div class="canvas-container">
                        <canvas id="formationCanvas" width="400" height="300"></canvas>
                    </div>
                    <div class="canvas-tools">
                        <button onclick="resetMarkers()">🔄 대형 초기화</button>
                        <button onclick="spreadFormation('line')">➖ 1열 가로대형</button>
                        <button onclick="spreadFormation('vShape')">📐 V자 대형</button>
                    </div>
                </div>

                <div>
                    <div class="section-title">⏱️ 구간별 동선 맵핑 컨트롤러</div>
                    <button class="btn btn-action" onclick="syncCurrentTime()">🕒 현재 영상 재생 시간 싱크 가져오기</button>
                    <div class="timeline-input-group" style="margin-top:8px;">
                        <input type="text" id="timelineTime" placeholder="0:00 (자동)">
                        <input type="text" id="timelineDesc" placeholder="이 파트의 대형 설명 (예: 에이스 센터 삼각대형)">
                        <button class="btn btn-search" onclick="addTimelineItem()">등록</button>
                    </div>
                    
                    <div class="timeline-list" id="timelineList"></div>
                </div>

                <div class="report-section">
                    <div class="section-title" style="color:#2ed573; border-bottom:1px solid #2ed573;">📋 생성된 안무 동선표 요약 리포트</div>
                    <div class="report-grid" id="reportGrid">
                        <div style="font-size:0.8rem; color:var(--text-muted); grid-column: 1/-1;">등록된 타임라인 동선표가 여기에 빌드됩니다.</div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyDjb6EuJcqPFbhwyIShQHDl1cwF32zd69U'; 

    let nextPageToken = ''; 
    let player = null; 
    let currentVideoId = '';
    let globalVideoDetails = {}; 
    
    // 📐 격자 및 마커 제어용 변수들
    let canvas, ctx;
    let dancers = [];
    let selectedDancer = null;
    const dancerRadius = 13;

    window.onload = function() {
        canvas = document.getElementById('formationCanvas');
        ctx = canvas.getContext('2d');

        // 마우스 및 터치 이벤트 리스너 바인딩 (드래그 제어)
        canvas.addEventListener('mousedown', onMouseDown);
        canvas.addEventListener('mousemove', onMouseMove);
        canvas.addEventListener('mouseup', onMouseUp);
        
        canvas.addEventListener('touchstart', onTouchStart, { passive: false });
        canvas.addEventListener('touchmove', onTouchMove, { passive: false });
        canvas.addEventListener('touchend', onMouseUp);

        initDancers();
    };

    // 1번부터 11번 멤버 초기 배치 (무대 중앙 X를 감싸는 다이아몬드/역삼각 기본 형태)
    function initDancers() {
        dancers = [];
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        const defaultPositions = [
            { x: centerX, y: centerY - 60, color: '#ff4757' }, // 1
            { x: centerX - 40, y: centerY - 30, color: '#ff4757' }, // 2
            { x: centerX - 60, y: centerY + 10, color: '#ff4757' }, // 3
            { x: centerX - 30, y: centerY + 50, color: '#ff4757' }, // 4
            { x: centerX, y: centerY + 80, color: '#ff4757' }, // 5
            { x: centerX + 30, y: centerY + 50, color: '#ff4757' }, // 6
            { x: centerX + 60, y: centerY + 10, color: '#ff4757' }, // 7
            { x: centerX + 40, y: centerY - 30, color: '#ff4757' }, // 8
            { x: centerX - 90, y: centerY - 30, color: '#ffa502' }, // 9 (사이드 옐로우 마커)
            { x: centerX + 90, y: centerY - 30, color: '#ffa502' }, // 10
            { x: centerX, y: centerY + 20, color: '#ffa502' }  // 11
        ];

        defaultPositions.forEach((pos, i) => {
            dancers.push({ id: i + 1, x: pos.x, y: pos.y, color: pos.color });
        });
        drawStage();
    }

    // 📐 요청하신 스크린샷과 동일한 어두운 테마 격자 무대와 중앙 핑크 X 그리기 엔진
    function drawStage() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 1. 격자망 배경 그리기 (Grid Line)
        ctx.strokeStyle = '#282828';
        ctx.lineWidth = 1;
        const gridSize = 25;
        
        for (let x = 0; x < canvas.width; x += gridSize) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += gridSize) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        // 2. 무대 정중앙 핵심 센터 앵커 포인트 (핑크색 'X') 구획
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        ctx.strokeStyle = '#ff4757';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(cx - 7, cy - 7); ctx.lineTo(cx + 7, cy + 7);
        ctx.moveTo(cx + 7, cy - 7); ctx.lineTo(cx - 7, cy + 7);
        ctx.stroke();

        // 3. 댄서 1~11번 마커 노드 렌더링
        dancers.forEach(dancer => {
            ctx.beginPath();
            ctx.arc(dancer.x, dancer.y, dancerRadius, 0, Math.PI * 2);
            ctx.fillStyle = dancer.color;
            ctx.fill();
            
            // 외곽선 살짝 부여
            ctx.strokeStyle = '#121212';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // 내부 댄서 백넘버 텍스트 마킹
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(dancer.id, dancer.x, dancer.y);
        });
    }

    // 드래그 앤 드롭 수학적 충돌 연산식
    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (e.clientX - rect.left) * (canvas.width / rect.width),
            y: (e.clientY - rect.top) * (canvas.height / rect.height)
        };
    }

    function onMouseDown(e) {
        const pos = getMousePos(e);
        // 역순 탐색으로 가장 위에 겹친 마커 우선 선택
        for (let i = dancers.length - 1; i >= 0; i--) {
            const d = dancers[i];
            const dist = Math.hypot(d.x - pos.x, d.y - pos.y);
            if (dist <= dancerRadius + 5) {
                selectedDancer = d;
                canvas.style.cursor = 'grabbing';
                break;
            }
        }
    }

    function onMouseMove(e) {
        const pos = getMousePos(e);
        if (selectedDancer) {
            selectedDancer.x = Math.max(dancerRadius, Math.min(canvas.width - dancerRadius, pos.x));
            selectedDancer.y = Math.max(dancerRadius, Math.min(canvas.height - dancerRadius, pos.y));
            drawStage();
        } else {
            // 마우스 올렸을 때 손가락 표시 커서 변경 피드백
            let hover = false;
            for (let d of dancers) {
                if (Math.hypot(d.x - pos.x, d.y - pos.y) <= dancerRadius) { hover = true; break; }
            }
            canvas.style.cursor = hover ? 'pointer' : 'default';
        }
    }

    function onMouseUp() { selectedDancer = null; canvas.style.cursor = 'default'; }

    // 터치 디바이스 호환성 레이어 추가
    function onTouchStart(e) { if(e.touches.length === 1) { onMouseDown(e.touches[0]); e.preventDefault(); } }
    function onTouchMove(e) { if(e.touches.length === 1) { onMouseMove(e.touches[0]); e.preventDefault(); } }

    function resetMarkers() { initDancers(); }

    // 원클릭 자동 프리셋 대형 정렬 서브 모듈
    function spreadFormation(type) {
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        
        if (type === 'line') {
            const startX = cx - 150;
            const step = 300 / 10;
            dancers.forEach((d, i) => { d.x = startX + (i * step); d.y = cy; });
        } else if (type === 'vShape') {
            dancers.forEach((d, i) => {
                if (i === 0) { d.x = cx; d.y = cy + 40; }
                else if (i % 2 === 1) { d.x = cx - (Math.ceil(i/2) * 30); d.y = cy + 40 - (Math.ceil(i/2) * 25); }
                else { d.x = cx + (Math.ceil(i/2) * 30); d.y = cy + 40 - (Math.ceil(i/2) * 25); }
            });
        }
        drawStage();
    }

    // 유튜브 API 통합 구조부
    function initialSearch() { nextPageToken = ''; fetchDanceVideos(); }
    function refreshVideos() { fetchDanceVideos(nextPageToken); }

    async function fetchDanceVideos(pageToken = '') {
        const genreInput = document.getElementById('genreInput').value.trim();
        const videoType = document.getElementById('videoType').value;
        const timeRange = document.getElementById('timeRange').value;
        const regionType = document.getElementById('regionType').value;
        const videoGrid = document.getElementById('videoGrid');
        const refreshBtn = document.getElementById('refreshBtn');

        if (!genreInput) { alert('검색어를 입력해 주세요!'); return; }
        if (!API_KEY || API_KEY.trim() === '' || API_KEY === 'YOUR_YOUTUBE_API_KEY_HERE') {
            alert('유튜브 API_KEY를 입력하셔야 연동됩니다.'); return;
        }

        videoGrid.innerHTML = '<div class="status-message">조건에 맞는 영상을 탐색 중입니다...</div>';
        let searchQuery = `${genreInput} choreography`;

        let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(searchQuery)}&type=video&maxResults=24&key=${API_KEY}`;
        if (pageToken) url += `&pageToken=${pageToken}`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            let videos = data.items;
            nextPageToken = data.nextPageToken || '';

            const videoIds = videos.map(item => item.id.videoId).join(',');
            const statsUrl = `https://www.googleapis.com/youtube/v3/videos?part=statistics,contentDetails,snippet&id=${videoIds}&key=${API_KEY}`;
            const statsResponse = await fetch(statsUrl);
            const statsData = await statsResponse.json();
            
            statsData.items.forEach(item => {
                globalVideoDetails[item.id] = { 
                    viewCount: parseInt(item.statistics.viewCount || 0), 
                    title: item.snippet.title,
                    description: item.snippet.description || ''
                };
            });

            videoGrid.innerHTML = '';
