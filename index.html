<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dance Formation Studio</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #ff4757; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .search-area { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 8px; cursor: pointer; padding: 10px; border: 1px solid #333; }
        .studio-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 1000; }
        canvas { background: #111; border: 1px solid #444; width: 100%; max-width: 400px; display: block; margin: 10px auto; }
        .btn { padding: 8px 16px; cursor: pointer; border: none; border-radius: 4px; background: var(--accent); color: white; }
    </style>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
<div class="container">
    <h1>Dance Studio</h1>
    <div class="search-area">
        <input type="text" id="q" placeholder="곡명 입력">
        <select id="type">
            <option value="normal">일반 (1분 이상)</option>
            <option value="shorts">Shorts (1분 내외)</option>
        </select>
        <button class="btn" onclick="search()">검색</button>
    </div>
    <div class="grid" id="results"></div>
</div>

<div class="studio-overlay" id="studio">
    <div style="display:flex; height:100%;">
        <div style="flex:1" id="yt-player"></div>
        <div style="flex:1; padding:20px; overflow-y:auto;">
            <button onclick="document.getElementById('studio').style.display='none'">닫기</button>
            <div id="ai-info" style="margin:20px 0; padding:15px; border-left:4px solid var(--accent); background:#222;"></div>
            <canvas id="canvas" width="400" height="300"></canvas>
        </div>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyDjb6EuJcqPFbhwyIShQHDl1cwF32zd69U'; // 키를 입력하세요

    async function search() {
        const q = document.getElementById('q').value;
        const type = document.getElementById('type').value;
        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q + ' choreography')}&type=video&maxResults=20&videoDuration=${type === 'shorts' ? 'short' : 'medium'}&key=${API_KEY}`;
        
        const res = await fetch(url);
        const data = await res.json();
        const grid = document.getElementById('results');
        grid.innerHTML = '';
        
        data.items.forEach(item => {
            const title = item.snippet.title.toLowerCase();
            const isShorts = title.includes('shorts');
            if ((type === 'shorts' && isShorts) || (type === 'normal' && !isShorts)) {
                grid.innerHTML += `
                    <div class="card" onclick="openStudio('${item.id.videoId}', '${item.snippet.title}')">
                        <img src="${item.snippet.thumbnails.medium.url}" style="width:100%">
                        <p>${item.snippet.title}</p>
                    </div>`;
            }
        });
    }

    function openStudio(id, title) {
        document.getElementById('studio').style.display = 'block';
        new YT.Player('yt-player', { videoId: id });
        
        // 난이도 판정
        const fullText = (title).toLowerCase();
        let diff = "중급", msg = "표준 안무입니다.";
        if (fullText.includes("easy") || fullText.includes("beginner")) { diff = "초급"; msg = "초보자용 기초 안무입니다."; }
        else if (fullText.includes("hard") || fullText.includes("expert") || fullText.includes("advanced") || fullText.includes("insane")) { diff = "상급"; msg = "고난도 안무입니다. 정밀한 대형 이동이 필요합니다."; }
        
        document.getElementById('ai-info').innerHTML = `<b>난이도: ${diff}</b><br>${msg}`;
    }
</script>
</body>
</html>
